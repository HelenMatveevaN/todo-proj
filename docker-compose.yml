version: '3.8'

services:
    db:
      image: postgres:15-alpine
      container_name: todo_db
      restart: always
      environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: password
        POSTGRES_DB: todo_db
      ports:
        - "5432:5432"

    app:
      build: .
      container_name: todo_app
      restart: on-failure
      depends_on:
        - db
      environment:
        - DATABASE_URL=postgres://postgres:password@db:5432/todo_db